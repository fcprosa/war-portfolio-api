theses:
  fertilizer_2028_scarcity:
    description: |
      Urea/potash structurally elevated through 2028 due to
      Middle East fertilizer infrastructure damage + Russia/Belarus
      sanctions on Western buyers. NDSU projects 13% above pre-crisis
      through 2028 even if Hormuz opens fast.
    confirming_signals:
      - urea_above_500
      - ipi_above_35
      - cf_above_115
      - russia_sanctions_intact
      - fertilizer_pre_book_rate_below_75pct
    breaking_signals:
      - russia_potash_resumes_to_west
      - urea_below_400
      - usda_corn_acreage_surprise_up
      - middle_east_fertilizer_capacity_restored

  hormuz_stays_closed_short_term:
    description: |
      Strait of Hormuz 7-day MA transit calls stays below 60
      through June 30, 2026. Driven by mine clearance timeline
      (6mo Pentagon estimate), insurance market gridlock, and
      Iranian command-and-control issues per Sanmar Herald incident.
    confirming_signals:
      - portwatch_7dma_below_30
      - mine_clearance_no_progress
      - insurance_premiums_above_3pct
      - iran_us_no_signed_deal
    breaking_signals:
      - portwatch_7dma_above_50
      - signed_deal_announced
      - insurance_premiums_collapse
      - mass_vessel_release

