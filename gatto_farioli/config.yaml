# Kalshi market-universe discovery.
# The events endpoint exposes Kalshi's real category strings; we normalize
# them into the canonical set below and filter by include/exclude lists.
# Sports is excluded by default — flip it by removing 'sports' from
# exclude_categories AND/OR adding it to include_categories.
kalshi:
  include_categories:
    - macro
    - rates
    - inflation
    - commodities
    - energy
    - geopolitics
    - economics
    - politics
    - weather
    - crypto
  exclude_categories:
    - sports
  min_volume_24h: 0
  min_open_interest: 0
  max_markets_per_run: 500

llm:
  provider: anthropic
  model_analysis: claude-sonnet-4-7-20260101
  model_classification: claude-haiku-4-5-20251001
  daily_token_budget: 100000
  monthly_cost_cap_usd: 15

schedule:
  ingestion_during_market_hours: "*/30 * * * *"
  ingestion_off_hours: "0 */4 * * *"
  daily_brief: "0 7 * * *"
  thesis_review: "0 18 * * *"
  weekly_deep_review: "0 9 * * SUN"
